name: CI

on:
  push:
    branches: [master, main]
  pull_request:
    branches: [master, main]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32-unknown-unknown

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Install dependencies
        run: npm ci

      - name: Build WASM
        run: |
          cargo build --release
          mkdir -p pkg
          cp target/wasm32-unknown-unknown/release/diffcore.wasm pkg/

      - name: Build TypeScript
        run: npm run build:js

      - name: Bundle WASM
        run: npm run build:bundle

      - name: Run edge-case test suite
        run: node test/edge-cases.mjs

      - name: Run stress test suite
        run: node test/stress.mjs

      - name: Run smoke test (applyPatch + revertPatch round-trip)
        run: node test/smoke.mjs

      - name: Run v1.2 feature tests (equals, ignore, scope, toJSON)
        run: node test/v1.2-features.mjs

      - name: Run v1.4 state-management tests (createHistory, merge3, conflicts, comparators)
        run: node test/v1.4-state.mjs

      - name: Verify Package
        run: npm pack --dry-run
